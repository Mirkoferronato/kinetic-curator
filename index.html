    function useCountdown() {
      const getTarget = () => { const e = new Date(); e.setHours(23,59,59,999); return e; };
      const [target] = useState(getTarget);
      const [now, setNow] = useState(new Date());
      useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
      const diff = Math.max(0, target - now);
      return `${String(Math.floor(diff/3600000)).padStart(2,"0")}:${String(Math.floor((diff%3600000)/60000)).padStart(2,"0")}:${String(Math.floor((diff%60000)/1000)).padStart(2,"0")}`;
    }

            return <p key={i} className="text-gray-600 dark:text-gray-400" dangerouslySetInnerHTML={{__html: bold}} />;

        dark ? document.documentElement.classList.add("dark") : document.documentElement.classList.remove("dark");
      }, [dark]);
 
      useEffect(() => { if (showSearch && searchRef.current) searchRef.current.focus(); }, [showSearch]);
 
      const top10 = useMemo(() => PRODUCTS.filter(p=>p.top10).sort((a,b)=>(a.top10rank||99)-(b.top10rank||99)).slice(0,10), []);
      const filtered = useMemo(() => PRODUCTS.filter(p => (activeCat==="all"||p.cat===activeCat) && (!search||p.title.toLowerCase().includes(search.toLowerCase()))), [activeCat, search]);
 
      return (
        <div className="min-h-screen bg-[#faf8ff] dark:bg-[#0a1a3a] text-[#0a1a3a] dark:text-[#faf8ff] transition-colors duration-300">
 
          {/* HEADER */}
          <header className="fixed top-0 w-full z-50 bg-white/90 dark:bg-[#0a1a3a]/90 backdrop-blur-xl border-b border-gray-200 dark:border-gray-700/40 shadow-sm">
            <div className="flex items-center justify-between px-5 py-3.5 max-w-6xl mx-auto">
              <button onClick={()=>setShowSearch(s=>!s)} className="text-[#ab3500] dark:text-[#ff6b35] hover:opacity-70 transition-opacity p-1">
                <Icon name={showSearch?"close":"search"} className="text-2xl" />
              </button>
              <div className="font-black tracking-tighter text-xl uppercase select-none text-[#0a1a3a] dark:text-white">
                KINETIC<span style={{color:"#ff6b35"}}>.</span>
              </div>
              <button onClick={()=>setDark(d=>!d)} className="text-[#ab3500] dark:text-[#ff6b35] hover:opacity-70 transition-opacity p-1">
                <Icon name={dark?"light_mode":"dark_mode"} className="text-2xl" />
              </button>
            </div>
            {showSearch && (
              <div className="px-5 pb-3 max-w-6xl mx-auto">
                <input ref={searchRef} type="text" value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="Cerca offerte... (es. Sony, Kindle, Robot, Garmin)"
                  className="w-full px-4 py-2.5 rounded-xl bg-gray-100 dark:bg-slate-800 text-sm outline-none text-gray-900 dark:text-white placeholder-gray-400"
                  style={{border:"none"}} />
              </div>
            )}
          </header>
 
          <main className="pt-20 pb-28 md:pb-12">
 
            {/* HERO */}
            <section className="px-5 py-10 md:py-16 max-w-6xl mx-auto">
              <div className="bg-[#f1f3ff] dark:bg-slate-800/60 rounded-3xl p-8 md:p-14 relative overflow-hidden flex flex-col items-center text-center">
                <div style={{position:"absolute",top:0,right:0,width:"256px",height:"256px",background:"rgba(255,107,53,0.08)",filter:"blur(80px)",marginRight:"-128px",marginTop:"-128px",pointerEvents:"none"}} />
                <div style={{position:"absolute",bottom:0,left:0,width:"192px",height:"192px",background:"rgba(0,167,203,0.06)",filter:"blur(60px)",marginLeft:"-96px",marginBottom:"-96px",pointerEvents:"none"}} />
 
                {/* Badge aggiornamento */}
                <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-[#00a7cb]/10 border border-[#00a7cb]/30 mb-5">
                  <span className="w-2 h-2 rounded-full bg-[#00a7cb] animate-pulse" style={{display:"inline-block"}} />
                  <p className="text-xs font-black text-[#00a7cb] uppercase tracking-widest">Aggiornato oggi — {TODAY}</p>
                </div>
 
                <h1 className="text-3xl md:text-5xl lg:text-6xl font-black tracking-tight uppercase mb-6 leading-tight text-[#0a1a3a] dark:text-white" style={{letterSpacing:"-0.02em"}}>
                  Le Migliori Offerte<br />Amazon del Giorno
                </h1>
 
                {/* Stats */}
                <div className="flex gap-6 mb-6 flex-wrap justify-center">
                  <div className="text-center">
                    <p className="text-2xl font-black text-[#ab3500]">{PRODUCTS.length}+</p>
                    <p className="text-xs text-gray-400 uppercase tracking-wider">Offerte selezionate</p>
                  </div>
                  <div className="w-px bg-gray-200 dark:bg-gray-700" />
                  <div className="text-center">
                    <p className="text-2xl font-black text-[#ab3500]">47%</p>
                    <p className="text-xs text-gray-400 uppercase tracking-wider">Sconto massimo</p>
                  </div>
                  <div className="w-px bg-gray-200 dark:bg-gray-700" />
                  <div className="text-center">
                    <p className="text-2xl font-black text-[#00a7cb]">Ogni giorno</p>
                    <p className="text-xs text-gray-400 uppercase tracking-wider">Selezione aggiornata</p>
                  </div>
                </div>
 
                <div className="inline-flex items-center gap-3 px-6 py-3 rounded-full text-sm tracking-widest uppercase shadow-lg font-medium mb-4"
                  style={{background:"#0a1a3a",color:"white"}}>
                  <Icon name="schedule" className="text-[#ff6b35] text-base" />
                  Offerte valide ancora per{" "}
                  <span className="text-[#ff6b35] font-black" style={{fontFamily:"monospace"}}>{countdown}</span>
                </div>
 
                <p className="text-xs text-gray-500 dark:text-gray-400 max-w-sm">
                  🎁 Clicchi e compri <strong>direttamente su Amazon al prezzo ufficiale</strong> — per te non cambia nulla, anzi supporti il nostro lavoro di selezione gratuita.
                </p>
              </div>
            </section>
 
            {/* BANNER DISCLAIMER PREZZI */}
            <section className="px-5 max-w-6xl mx-auto mb-8">
              <div className="flex items-start gap-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/40 rounded-2xl px-5 py-4">
                <Icon name="info" className="text-amber-500 text-xl flex-shrink-0 mt-0.5" />
                <p className="text-xs text-amber-700 dark:text-amber-300 leading-relaxed">
                  <strong>I prezzi indicati (~€) sono orientativi</strong> e rilevati al momento della selezione — Amazon può aggiornarli in qualsiasi momento. Clicca sempre su "Vai all'Offerta" per vedere il <strong>prezzo aggiornato e la disponibilità reale</strong> direttamente su Amazon.it.
                </p>
              </div>
            </section>
 
            {/* TOP 10 */}
            {top10.length > 0 && (
              <section className="px-5 max-w-6xl mx-auto mb-12">
                <div className="flex items-center gap-3 mb-5">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,#ab3500,#ff6b35)"}}>
                    <Icon name="trophy" className="text-white text-lg" />
                  </div>
                  <h2 className="text-xl md:text-2xl font-black uppercase tracking-tight">Top 10 Sconti del Momento</h2>
                </div>
                <div className="flex gap-4 pb-4 no-scrollbar" style={{overflowX:"auto"}}>
                  {top10.map((p,i) => <Top10Card key={p.id} product={p} rank={i+1} />)}
                </div>
              </section>
            )}
 
            {/* COME FUNZIONA */}
            <HowItWorks />
 
            {/* CATEGORIES — desktop */}
            <section className="hidden md:flex justify-center gap-3 px-5 mb-10 flex-wrap">
              {CATEGORIES.map(c => (
                <button key={c.id} onClick={()=>setActiveCat(c.id)}
                  className={`px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider transition-all duration-200 ${activeCat===c.id?"text-white shadow-md":"bg-blue-100 dark:bg-slate-700 text-[#0a1a3a] dark:text-gray-300 hover:bg-blue-200 dark:hover:bg-slate-600"}`}
                  style={activeCat===c.id?{background:"linear-gradient(90deg,#ab3500,#ff6b35)"}:{}}>
                  {c.label}
                </button>
              ))}
            </section>
 
            {/* GRID */}
            <section className="px-5 max-w-6xl mx-auto">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,#0a1a3a,#00a7cb)"}}>
                    <Icon name="local_offer" className="text-white text-lg" />
                  </div>
                  <h2 className="text-xl md:text-2xl font-black uppercase tracking-tight">
                    {activeCat==="all" ? "Tutte le Offerte" : CATEGORIES.find(c=>c.id===activeCat)?.label}
                  </h2>
                </div>
                <span className="text-xs text-gray-400 font-bold">{filtered.length} offert{filtered.length===1?"a":"e"}</span>
              </div>
              {filtered.length === 0 ? (
                <div className="text-center py-20 text-gray-400">
                  <Icon name="search_off" className="text-5xl mb-3 block" />
                  <p className="text-sm">Nessuna offerta trovata per "{search}"</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                  {filtered.map(p => <ProductCard key={p.id} product={p} />)}
                </div>
              )}
            </section>
          </main>
 
          {/* FOOTER */}
          <footer className="w-full py-10 bg-[#f1f3ff] dark:bg-[#1a2a4a]">
            <div className="flex flex-col items-center text-center px-8 gap-4 max-w-2xl mx-auto">
              <div className="font-black tracking-tighter text-lg uppercase text-[#0a1a3a] dark:text-white">
                KINETIC<span style={{color:"#ff6b35"}}>.</span>
              </div>
              <p className="text-xs text-gray-500 dark:text-gray-400">
                ✅ I prezzi che vedi sono quelli di Amazon — <strong>non paghi nulla in più</strong>. Ogni acquisto tramite i nostri link ci permette di continuare a trovare le offerte migliori per te, gratis.
              </p>
              <div className="flex gap-6 flex-wrap justify-center">
                <button onClick={()=>setModal('privacy')} className="text-xs text-gray-500 dark:text-gray-400 hover:text-[#ab3500] transition-colors">Privacy Policy</button>
                <button onClick={()=>setModal('terms')} className="text-xs text-gray-500 dark:text-gray-400 hover:text-[#ab3500] transition-colors">Termini di Servizio</button>
                <button onClick={()=>setModal('cookie')} className="text-xs text-gray-500 dark:text-gray-400 hover:text-[#ab3500] transition-colors">Cookie Policy</button>
              </div>
              <p className="text-xs text-gray-400 dark:text-gray-500">
                © 2026 Kinetic Curator — Partecipante al Programma Affiliazione Amazon EU (kineticapp-21).<br />I prezzi indicati sono orientativi: verifica sempre il prezzo finale su Amazon.it.
              </p>
            </div>
          </footer>
 
          {/* BOTTOM NAV — mobile */}
          <nav className="md:hidden fixed bottom-0 w-full z-50 bg-white/90 dark:bg-[#0a1a3a]/90 backdrop-blur-xl border-t border-gray-200 dark:border-gray-700/40">
            <div className="flex justify-around items-center h-16 px-2">
              {CATEGORIES.filter(c=>["electronics","home","sport","bambini"].includes(c.id)).map(c => {
                const active = activeCat===c.id;
                return (
                  <button key={c.id} onClick={()=>setActiveCat(active?"all":c.id)}
                    className={`flex flex-col items-center gap-0.5 transition-all duration-200 ${active?"text-[#ab3500] dark:text-[#ff6b35]":"text-gray-400 dark:text-gray-500"}`}>
                    <Icon name={c.icon} className="text-2xl" />
                    <span className="font-bold tracking-wider uppercase" style={{fontSize:"9px"}}>{c.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>
 
          {/* MODALS */}
          {modal==='privacy' && <Modal title="Privacy Policy" content={PRIVACY_CONTENT} onClose={()=>setModal(null)} />}
          {modal==='terms'   && <Modal title="Termini di Servizio" content={TERMS_CONTENT} onClose={()=>setModal(null)} />}
          {modal==='cookie'  && <Modal title="Cookie Policy" content={COOKIE_CONTENT} onClose={()=>setModal(null)} />}
        </div>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
